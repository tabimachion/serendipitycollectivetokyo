  <title>Serendipity Collective Tokyo</title>
  <meta name="description" content="We're re-editing Tokyo, block by block. DIYなブロックパーティー（概念）">
  <meta property="og:title" content="Serendipity Collective Tokyo">
  <meta property="og:description" content="We're re-editing Tokyo, block by block.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://serendipitycollective.tokyo/images/logo.jpg">
  <meta property="og:url" content="https://serendipitycollective.tokyo/">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Cinematic Hero -->
  <section class="hero">
    <video class="hero-video" autoplay muted loop playsinline preload="metadata">
      <source src="videos/video-1.mp4" type="video/mp4">
    </video>
    <div class="hero-overlay"></div>
    <div class="hero-grain"></div>
    <div class="hero-content">
      <div class="hero-logo">
        <img src="images/logo.png" alt="Serendipity Collective Tokyo">
      </div>
      <div class="hero-text">
        <h1 class="hero-title">We're re-editing Tokyo,<br>block by block.</h1>
      </div>
    </div>
    <div class="hero-bottom">
      <span class="scroll-text">Scroll</span>
      <div class="scroll-line"></div>
    </div>
  </section>

  <!-- Manifesto -->
  <section class="manifesto">
    <p class="manifesto-text">
      No script. No VIP. Just vibes.
    </p>
  </section>

  <!-- Archive -->
  <section class="archive">
    <div class="archive-grid">
      <div class="archive-item">
        <video muted loop playsinline preload="none" data-src="videos/video-1.mp4"></video>
      </div>
      <div class="archive-item">
        <video muted loop playsinline preload="none" data-src="videos/video-2.mp4"></video>
      </div>
      <div class="archive-item">
        <video muted loop playsinline preload="none" data-src="videos/video-3.mp4"></video>
      </div>
      <div class="archive-item">
        <video muted loop playsinline preload="none" data-src="videos/video-4.mp4"></video>
      </div>
      <div class="archive-item">
        <video muted loop playsinline preload="none" data-src="videos/video-5.mp4"></video>
      </div>
      <div class="archive-item">
        <video muted loop playsinline preload="none" data-src="videos/video-6.mp4"></video>
      </div>
    </div>
  </section>

  <script>
    // Lazy load archive videos
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const video = entry.target;
          if (video.dataset.src && !video.src) {
            video.src = video.dataset.src;
            video.load();
            video.play();
          }
          observer.unobserve(video);
        }
      });
    }, { rootMargin: '100px' });

    document.querySelectorAll('.archive-item video').forEach(v => observer.observe(v));
  </script>
